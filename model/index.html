<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Wheelies ML</title>

  <!-- Bootstrap stuff -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
  
  <!-- Import TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.0.0/dist/tf.min.js"></script>
  <!-- Import tfjs-vis -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.0.2/dist/tfjs-vis.umd.min.js"></script>

  <!-- Import the main script file & common knack utils -->
  <script src="../script/theknack.js"></script>
  <script src="script.js"></script>

  <!-- Site CSS -->
  <link rel="stylesheet" href="../style/theknack.css">

</head>

<body id="bg">
  <div class="container-fluid">
    <div class="row">
    <div class="col-xs-2">
      <h4><a href="../">&lt;</a></h4>
    </div>
    <div class="col-xs-8">
      <h4 style="margin-bottom:3em;">wheelies ml</h4>
    </div>
    <div class="col-xs-2"></div>
    </div>
  </div>
  <div id="start-action" class="container-fluid">
    <div class="row">
    <div class="col-xs-2">
    </div>
    <div class="col-xs-8">
    <button id="start_button" class="btn btn-primary btn-block" onClick="startSensors()">
      <h4 id="start_button_text">start session</h4>
    </button>
    <p>all data remains on your device</p>
    </div>
    <div class="col-xs-2">
    </div>
    </div>
  </div>
  <div id="raw-readout" class="container-fluid">
    <div class="row">
    <div class="col-xs-1">
    </div>
    <div class="col-xs-2">
    <p>accel:</p>
    </div>
    <div class="col-xs-2">
    <p><span id="acc_x">0.00</span></p>
    </div>
    <div class="col-xs-2">
    <p><span id="acc_y">0.00</span></p>
    </div>
    <div class="col-xs-2">
    <p><span id="acc_z">0.00</span></p>
    </div>
    <div class="col-xs-2">
    <p>m/s<sup>2</sup></p>
    </div>
    <div class="col-xs-1">
    </div>
    </div>
  </div>
  <div class="container-fluid">
    <p class="readout-large"><span id="timer_time">0.0</span></p>
    <p>seconds wheel up</p>
    <p>ml score: <span id="y">-</span></p>
    <h1 style="min-height:2em;"><span id="timer_rock"></span></h1>
    <div id="history-data"></div>
    <div id="history-log"></div>
  </div>
  <!-- Bootstrap stuff -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
</body>
</html>
