<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Wheelies</title>

  <!-- Bootstrap stuff -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
  
  <!-- Import the main script file -->
  <script src="script.js"></script>

</head>

<body id="bg" style="font-family:sans-serif;">
  <div class="container-fluid" style="text-align:center">
    <div class="row">
    <div class="col-xs-2">
      <h1><a href="../" style="text-decoration:none;">&lt;</a></h1>
    </div>
    <div class="col-xs-8">
      <h1 style="margin-bottom:1em;">wheelies</h1>
    </div>
    <div class="col-xs-2"></div>
  </div>
  <div class="container-fluid" style="text-align:center;">
    <button id="start_button" class="btn btn-primary btn-block" onClick="startSession()">
      <h3 id="start_button_text">start session</h3>
    </button>
  </div>
  <div class="container-fluid" style="text-align:center;">
    <h3>
    pitch: <span id="ori_b">0</span>&deg;
    </h3>
    <p>
    <span id="set_pitch">
    <a href="javascript:setPitchThreshold()" style="text-decoration:none;">🆙</a>
    </span>
    <span id="pitch_threshold">50.5</span>&deg;
    </p>
    <h3>wheel up: <span id="timer_time">0</span>s</h3>     
    <h1 style="min-height:2em;"><span id="timer_rock"></span></h1>
    <div id="history-data">
    </div>
  </div>
  <!-- Bootstrap stuff -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
</body>
</html>
