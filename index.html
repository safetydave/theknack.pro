<body onload="initVideo()">
  <video id="fullscreen-video" autoplay muted loop>
      <source src="wheely_o8nt.mp4" type="video/mp4">
  </video>

  <script>

  function initVideo() {
    $('#fullscreen-video').get(0).currentTime = 4.5;
  }

  function toggleVideo() {
    video = $('#fullscreen-video').get(0);
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  }

  </script>
