  <video id="fullscreen-video" autoplay muted loop>
      <source src="wheely_o8nt.mp4" type="video/mp4">
  </video>

  <script>

  document.addEventListener('DOMContentLoaded', initVideo);

  function initVideo() {
    video = $('#fullscreen-video').get(0);
    video.currentTime = 4.5;
    if (video.paused) {
      $('#video-button').html('pause');
    }
  }

  function toggleVideo() {
    video = $('#fullscreen-video').get(0);
    if (video.paused) {
      video.play();
      $('#video-button').html('pause');
    } else {
      video.pause();
      $('#video-button').html('play');
    }
  }

  </script>
