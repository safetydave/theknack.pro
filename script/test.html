<!DOCTYPE html>
<html lang="en">
<head>
  <title>Testing the Knack</title>

  <!-- Import TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.0.0/dist/tf.min.js"></script>

  <!-- Script for testing -->
  <script src="../script/theknack.js"></script>
</head>
<body onload="javascript:testAll()">
  <h1>Testing the Knack Script</h1>
  <div id="test-all"></div>
  <h2>Sample Helper</h2>
  <div id="test-sample"></div>
  <script>

function testSample() {
  ks_array = new Array(25);
  sample = Array.from(Array(450).keys());
  sample_pointer = 0;
  hf_interval = 17;
  
  start = Date.now()
  hf_timer = setInterval(function() {
  	tryKnackSample(sample[sample_pointer]);
  	sample_pointer++;
  	if (sample_pointer === sample.length) {
      clearInterval(hf_timer);
  	}
  }, hf_interval);
  
  setTimeout(function() {
    logToDoc('#test-sample', '60Hz in ' + sample.toString());
    logToDoc('#test-sample', '10Hz out ' + ks_array.toString());
  }, hf_interval * (sample.length + 1));
}

  </script>
  <h2>Delta Helper</h2>
  <div id="test-delta"></div>
  <script>

function testDelta() {
  in_arr = [1, 2, 3, 358, 359, 270];

  rads = in_arr.map(deg2rad);
  deltas = asAngleDeltas(rads);
  degs = deltas.map(rad2deg).map(Math.round);

  logToDoc('#test-delta', 'sequence in degrees ' + in_arr);
  logToDoc('#test-delta', '(rads) ' + rads);
  logToDoc('#test-delta', 'as abs deltas ' + deltas);
  logToDoc('#test-delta', '(degs) ' + degs);
}

  </script>
  <h2>Coach Prediction</h2>
  <div id="test-coach"></div>
  <script>

var duration_model;

async function loadCoach() {
  duration_model = await tf.loadLayersModel('https://theknack.pro/wheelies/duration_model/model.json');
  tryCoachPrediction();
}

document.addEventListener('DOMContentLoaded', loadCoach);

var X = [];

function testCoach() {
  logToDoc('#test-coach', 'Hello Coach');

  for (i = 0; i < 25; i++) {
    X[i] = [0, 0, 0];
  }

  logToDoc('#test-coach', X);
}

function tryCoachPrediction() {
  logToDoc('#test-coach', duration_model);
  dur_pred = predictLive(duration_model, X);
  logToDoc('#test-coach', dur_pred);

}

  </script>

  <!-- Run all tests -->
  <script>

var tests = [testSample, testDelta, testCoach];

function testAll() {
  for (i = 0; i < tests.length; i++) {
  	console.log('Running test ' + i);
    tests[i]();
  }
  $('#test-all').append('<p>' + tests.length + ' tests run (results may be async)</p>');
}

function logToDoc(element_id, message) {
  $(element_id).append('<p>' + message + '</p>');
}

  </script>
  <!-- JQuery -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js" integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous"></script>
</body>
</html>
